<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - The Barbershop of Love</title>
  <link rel="stylesheet" href="registros.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">

  <div class="login-card">
    <h2><i class="fa-solid fa-user-plus"></i> Registrarse</h2>
    <p>Crea una cuenta administrativa con tu frase de seguridad única para proteger tus datos.</p>
    
    <form action="procesar_registro.php" method="POST">
      
      <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" name="usuario" placeholder="Nuevo Usuario" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="password" placeholder="Contraseña" required>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-shield-heart"></i>
        <input type="text" name="clave_recuperacion" placeholder="Segunda contraseña de Verificacion" required>
      </div>

      <button type="submit" class="boton-animado">Registrar Cuenta</button>
      
      <div class="login-links">
        <a href="login.html" class="link-olvido"><i class="fa-solid fa-arrow-left"></i> Volver al Login</a>
      </div>
    </form>
  </div>


 
</body>
</html>
